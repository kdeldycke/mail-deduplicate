---
name: 🔬 Tests
"on":
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - mail_deduplicate/**
      - tests/**
      - pyproject.toml
      - uv.lock
      - .github/workflows/tests.yaml
  pull_request:
    branches-ignore:
      # This filter matches the PR's *base* branch (always `main`), not its
      # head, so it does not actually exclude these PRs — see
      # https://github.com/actions/runner/issues/1591. The real skip is the
      # `github.head_ref` check in the `metadata` job's `if:` below. Kept
      # here as documentation of intent.
      - major-version-increment
      - minor-version-increment
      - prepare-release
    paths:
      - mail_deduplicate/**
      - tests/**
      - pyproject.toml
      - uv.lock
      - .github/workflows/tests.yaml
  schedule:
    # Run tests monthly to catch regressions from dependency or environment changes.
    - cron: "17 9 1 * *"

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ !startsWith(github.event.head_commit.message, '[changelog] Release') }}

jobs:

  tests:
    strategy:
      # We delegate the failure decision to each job, by the way of the "continue-on-error" flag.
      fail-fast: false
      matrix:
        # Available OS: https://github.com/actions/runner-images#available-images
        # To speed up the tests, we only test the latest available OS for each platform.
        os:
          - ubuntu-24.04-arm # arm64
          - macos-26         # arm64
          - windows-11-arm   # arm64
        python-version:
          - "3.10"
          # Ignore intermediate versions to reduce CI load.
          # - "3.11"
          # - "3.12"
          # - "3.13"
          - "3.14"
          - "3.14t"
          - "3.15"
          - "3.15t"
        include:
          # Default all jobs as stable, unless marked otherwise below.
          - state: stable
          # XXX Python 3.15 is still in development.
          - state: unstable
            python-version: "3.15"
          - state: unstable
            python-version: "3.15t"
    name: "${{ matrix.state == 'stable' && '✅' || '⁉️' }} ${{ matrix.os }} / py${{ matrix.python-version }}"
    runs-on: ${{ matrix.os }}
    # We keep going when a job flagged as not stable fails.
    continue-on-error: ${{ matrix.state == 'unstable' }}
    steps:
      - uses: actions/checkout@v6.0.1
      - uses: astral-sh/setup-uv@v7.1.5
      - name: Install Python ${{ matrix.python-version }}
        # If UV cannot find the requested Python version, it exits with code 2, which let the job pass unnoticed on
        # Windows. So we force the shell to bash, even on Windows, and "set -e" to ensure any error in the install
        # process is caught and fails the job. It works because Windows runners too Git Bash available).
        shell: bash
        run: |
          set -e
          uv --no-progress venv --python ${{ matrix.python-version }}
      - name: Install project
        run: |
          uv --no-progress sync --frozen --all-extras --group test

      - name: Run local CLI
        run: |
          uv run -- mdedup --version
      - name: Run CLI from module
        run: |
          uv run        -m mail_deduplicate --version
          uv run python -m mail_deduplicate --version
      - name: Run stable CLI
        # mail-deduplicate 8.1.2 (the current stable release on PyPI) requires
        # click-extra>=7.3.0 with no upper bound. In practice the 8.1.2 code only
        # works with click-extra<7.15 (7.15+ renamed default_theme, 8.0+ removed
        # ExtraCommand). Pin click-extra<7.15 for the uvx and script-entrypoint
        # variants that exercise the PyPI package's own code. The -m module
        # variants run the local project's code (editable-installed, higher
        # priority in sys.path), so they use the project's own click-extra range.
        run: |
          uvx    --from mail-deduplicate --with 'click-extra<7.15'                   -- mdedup --version
          uv run --with mail-deduplicate --with 'click-extra<7.15'                   -- mdedup --version
          uv run --with mail-deduplicate                                              -m mail_deduplicate --version
          uv run --with mail-deduplicate                                        python -m mail_deduplicate --version
      - name: Run dev CLI
        run: |
          uvx    --from git+https://github.com/kdeldycke/mail-deduplicate -- mdedup --version
          uv run --with git+https://github.com/kdeldycke/mail-deduplicate -- mdedup --version
          uv run --with git+https://github.com/kdeldycke/mail-deduplicate -m mail_deduplicate --version
          uv run --with git+https://github.com/kdeldycke/mail-deduplicate python -m mail_deduplicate --version

      - name: Unittests
        # Produce XML artifacts for Codecov integration (coverage + test analytics).
        run: >
          uv --no-progress run --frozen -- pytest
          --junitxml=junit.xml
          --override-ini=junit_family=legacy

      - name: Upload coverage to Codecov
        # Skip on sync-repomatic PRs (data-only changes with no coverable lines)
        # and fork PRs (secrets are not available).
        # continue-on-error: codecov-cli depends on test-results-parser, a Rust
        # extension with no wheel for win-arm64 or free-threaded Python. A build
        # failure there must not fail the overall test job.
        if: >
          github.head_ref != 'sync-repomatic'
          && env.CODECOV_TOKEN != ''
        continue-on-error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        shell: bash
        run: >
          uvx --no-progress 'codecov-cli==11.2.8'
          --auto-load-params-from githubactions
          upload-process
          --git-service github
          --report-type coverage
          --token "${CODECOV_TOKEN}"
      - name: Upload test results to Codecov
        if: >
          github.head_ref != 'sync-repomatic'
          && env.CODECOV_TOKEN != ''
        continue-on-error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        shell: bash
        run: >
          uvx --no-progress 'codecov-cli==11.2.8'
          --auto-load-params-from githubactions
          upload-process
          --git-service github
          --report-type test_results
          --token "${CODECOV_TOKEN}"
